# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

when@prod:
    framework:
        # Dokploy / Traefik on Docker: trust proxy headers from private subnets only.
        trusted_proxies: 'PRIVATE_SUBNETS'
        trusted_headers:
            - !php/const Symfony\Component\HttpFoundation\Request::HEADER_X_FORWARDED_TRAEFIK

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
